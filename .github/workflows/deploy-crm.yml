name: Deploy CRM

on:
  push:
    branches:
      - main
    paths:
      - 'apps/crm/**'
      - '.github/workflows/deploy-crm.yml'
  workflow_dispatch:

concurrency:
  group: deploy-crm
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    name: Deploy CRM to Cloudflare Workers
    defaults:
      run:
        working-directory: apps/crm
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'pnpm'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: .

      - name: Deploy with Alchemy
        run: pnpm run crm-deploy
        env:
          STAGE: prod
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          ALCHEMY_PASSWORD: ${{ secrets.ALCHEMY_PASSWORD }}
          ALCHEMY_STATE_TOKEN: ${{ secrets.ALCHEMY_STATE_TOKEN }}
          APP_URL: https://crm.wodsmith.com
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          CRM_AUTH_PASSWORD: ${{ secrets.CRM_AUTH_PASSWORD }}
          CRM_SESSION_SECRET: ${{ secrets.CRM_SESSION_SECRET }}
