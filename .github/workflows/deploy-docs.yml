name: Deploy Docs

on:
  push:
    branches:
      - main
    paths:
      - 'apps/docs/**'
  workflow_dispatch: # Allow manual trigger

concurrency:
  group: deploy-docs-${{ github.ref }}
  cancel-in-progress: false

env:
  STAGE: prod

jobs:
  deploy-docs:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    name: Deploy Docs to Cloudflare Workers
    defaults:
      run:
        working-directory: apps/docs
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'pnpm'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          # Pin to match deploy.yml / deploy-crm.yml — unpinned Bun 1.3.14
          # segfaults running alchemy.run.ts (exit 132)
          bun-version: 1.3.13

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: .

      - name: Build docs
        run: pnpm build

      - name: Deploy with Alchemy
        run: pnpm alchemy:deploy
        env:
          STAGE: ${{ env.STAGE }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          ALCHEMY_PASSWORD: ${{ secrets.ALCHEMY_PASSWORD }}
          ALCHEMY_STATE_TOKEN: ${{ secrets.ALCHEMY_STATE_TOKEN }}
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
