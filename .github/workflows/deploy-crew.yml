name: Deploy Crew

on:
  push:
    branches:
      - main
    paths:
      - 'apps/crew/**'
      - 'packages/wodsmith-db/**'
      - '.github/workflows/deploy-crew.yml'
  workflow_dispatch:
    inputs:
      stage:
        description: Deployment stage
        required: true
        default: demo
        type: choice
        options:
          - prod
          - demo
          - staging
          - dev

concurrency:
  group: deploy-crew-${{ github.ref }}-${{ inputs.stage || 'demo' }}
  cancel-in-progress: false

env:
  STAGE: ${{ github.event_name == 'workflow_dispatch' && inputs.stage || 'demo' }}

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    name: Validate Crew
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check WODsmith schema ownership
        run: pnpm check:schema-ownership

      - name: Type-check database package
        run: pnpm --filter @repo/wodsmith-db type-check

      - name: Type-check Crew
        run: pnpm --filter crew type-check

      - name: Generate Crew Alchemy wrangler config for CI
        run: |
          mkdir -p apps/crew/.alchemy/local
          cat > apps/crew/.alchemy/local/wrangler.jsonc << 'EOF'
          {
            "name": "wodsmith-crew-ci",
            "main": "@tanstack/react-start/server-entry",
            "compatibility_date": "2026-06-19",
            "compatibility_flags": ["nodejs_compat", "nodejs_compat_populate_process_env"],
            "assets": {
              "directory": "../../dist/client",
              "binding": "ASSETS",
              "not_found_handling": "none",
              "html_handling": "auto-trailing-slash",
              "run_worker_first": false
            },
            "kv_namespaces": [{ "binding": "KV_SESSION", "id": "ci-placeholder" }],
            "r2_buckets": [{ "binding": "R2_BUCKET", "bucket_name": "ci-placeholder" }],
            "hyperdrive": [{ "binding": "HYPERDRIVE", "id": "ci-placeholder" }],
            "vars": {
              "APP_URL": "http://localhost:3002",
              "SITE_URL": "http://localhost:3002",
              "DATABASE_URL": "mysql://ci-placeholder@localhost/wodsmith-db"
            }
          }
          EOF

      - name: Build Crew
        run: pnpm --filter crew build

  deploy:
    runs-on: ubuntu-latest
    needs: validate
    permissions:
      contents: read
      deployments: write
    name: Deploy Crew to Cloudflare Workers
    environment: ${{ github.event_name == 'workflow_dispatch' && inputs.stage == 'prod' && 'production' || '' }}
    defaults:
      run:
        working-directory: apps/crew
    steps:
      - name: Guard prod deploys to main branch only
        if: ${{ env.STAGE == 'prod' && github.ref != 'refs/heads/main' }}
        run: |
          echo "ERROR: Crew production deploys can only be triggered from main."
          echo "Current branch: ${{ github.ref }}"
          exit 1

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: .

      - name: Setup pscale
        uses: planetscale/setup-pscale-action@v1

      - name: Generate PlanetScale branch password
        env:
          PLANETSCALE_SERVICE_TOKEN_ID: ${{ secrets.PLANETSCALE_SERVICE_TOKEN_ID }}
          PLANETSCALE_SERVICE_TOKEN: ${{ secrets.PLANETSCALE_SERVICE_TOKEN }}
        run: |
          branch="${STAGE}"
          if [ "$branch" = "prod" ]; then
            branch="main"
          fi

          response=$(pscale password create ${{ secrets.PLANETSCALE_DATABASE_NAME }} "$branch" "" -f json --org ${{ secrets.PLANETSCALE_ORGANIZATION }})

          host=$(echo "$response" | jq -r '.access_host_url')
          username=$(echo "$response" | jq -r '.username')
          password=$(echo "$response" | jq -r '.plain_text')
          database_url="mysql://$username:$password@$host/${{ secrets.PLANETSCALE_DATABASE_NAME }}"
          echo "DATABASE_URL=$database_url" >> $GITHUB_ENV
          echo "::add-mask::$database_url"

      # Production schema promotion must happen through PlanetScale deploy
      # requests. Only non-prod Crew deploys may push package-owned schema.
      - name: Push schema to PlanetScale branch
        if: ${{ env.STAGE != 'prod' }}
        run: pnpm --filter @repo/wodsmith-db db:push
        working-directory: .
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}

      - name: Deploy with Alchemy
        run: pnpm run deploy
        env:
          NODE_OPTIONS: --max-old-space-size=5120
          STAGE: ${{ env.STAGE }}
          DATABASE_URL: ${{ env.DATABASE_URL }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          ALCHEMY_PASSWORD: ${{ secrets.ALCHEMY_PASSWORD }}
          ALCHEMY_STATE_TOKEN: ${{ secrets.ALCHEMY_STATE_TOKEN }}
          APP_URL: ${{ env.STAGE == 'prod' && 'https://crew.wodsmith.com' || (env.STAGE == 'demo' && 'https://crew-demo.wodsmith.com' || format('https://wodsmith-crew-{0}.zacjones93.workers.dev', env.STAGE)) }}
          TURNSTILE_SITE_KEY: ${{ vars.CREW_TURNSTILE_SITE_KEY }}
          TURNSTILE_SECRET_KEY: ${{ secrets.CREW_TURNSTILE_SECRET_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          POSTHOG_KEY: ${{ secrets.CREW_POSTHOG_KEY }}
          SENTRY_DSN: ${{ secrets.CREW_SENTRY_DSN }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: wodsmith
          SENTRY_PROJECT: wodsmith-crew
          GITHUB_SHA: ${{ github.sha }}
