<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Invites · Mountain West Fitness Championship · WODsmith</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700;800&family=Geist+Mono:wght@400;500;600&family=Instrument+Serif:ital@0;1&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        /* Mirror WODsmith tokens (HSL) */
        --background: 0 0% 100%;
        --foreground: 20 14.3% 4.1%;
        --card: 0 0% 100%;
        --muted: 60 4.8% 95.9%;
        --muted-foreground: 25 5.3% 44.7%;
        --primary: 24.6 95% 53.1%;
        --primary-foreground: 60 9.1% 97.8%;
        --border: 20 5.9% 90%;
        --ring: 24.6 95% 53.1%;

        --accept: 142 71% 36%;
        --accept-bg: 142 71% 96%;
        --pending: 35 95% 50%;
        --pending-bg: 40 95% 96%;
        --declined: 0 72% 51%;
        --declined-bg: 0 72% 97%;
        --ticket: 263 70% 50%;
      }

      html,
      body {
        font-family:
          "Geist",
          ui-sans-serif,
          system-ui,
          -apple-system,
          sans-serif;
        font-feature-settings: "cv11", "ss01", "ss03";
        color: hsl(var(--foreground));
        background: hsl(var(--background));
      }
      .font-mono {
        font-family: "Geist Mono", ui-monospace, monospace;
      }
      .font-display {
        font-family: "Geist", sans-serif;
        letter-spacing: -0.02em;
      }
      .font-serif {
        font-family: "Instrument Serif", serif;
        letter-spacing: -0.01em;
      }
      .tabular-nums {
        font-variant-numeric: tabular-nums;
      }

      /* Scrollbar */
      .thin-scroll::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }
      .thin-scroll::-webkit-scrollbar-thumb {
        background: hsl(var(--border));
        border-radius: 999px;
      }

      /* Row left accent bar using box-shadow to avoid affecting table layout */
      .row-accent-accepted {
        box-shadow: inset 3px 0 0 0 hsl(var(--accept));
        background: hsl(var(--accept-bg) / 0.55);
      }
      .row-accent-pending {
        box-shadow: inset 3px 0 0 0 hsl(var(--pending));
        background: hsl(var(--pending-bg) / 0.5);
      }
      .row-accent-ticket {
        box-shadow: inset 3px 0 0 0 hsl(var(--ticket));
        background: hsl(var(--ticket) / 0.05);
      }
      .row-accent-declined {
        box-shadow: inset 3px 0 0 0 hsl(var(--declined));
        background: hsl(var(--declined-bg) / 0.45);
      }
      .row-accent-expired {
        box-shadow: inset 3px 0 0 0 hsl(var(--muted-foreground) / 0.5);
      }
      .row-accent-none {
        box-shadow: inset 3px 0 0 0 transparent;
      }
      .row-selected {
        background: hsl(var(--primary) / 0.07) !important;
        box-shadow:
          inset 3px 0 0 0 hsl(var(--primary)),
          inset -1px 0 0 0 hsl(var(--primary) / 0.2);
      }

      /* Bold variant */
      .bold-variant .card-chrome {
        border-radius: 4px;
        border: 1px solid hsl(var(--foreground) / 0.12);
        background: hsl(0 0% 99%);
        box-shadow:
          0 1px 0 hsl(var(--foreground) / 0.04),
          0 0 0 1px hsl(var(--foreground) / 0.02);
      }
      .bold-variant .display-number {
        font-family: "Geist", sans-serif;
        font-weight: 700;
        letter-spacing: -0.04em;
      }
      .bold-variant .page-title {
        font-family: "Instrument Serif", serif;
        font-weight: 400;
        letter-spacing: -0.03em;
      }
      .bold-variant .section-label {
        font-family: "Geist Mono", monospace;
        font-size: 10.5px;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        font-weight: 500;
      }
      .bold-variant .big-stat {
        background: hsl(20 14.3% 4.1%);
        color: white;
      }
      .bold-variant .table-row-hover:hover {
        background: hsl(var(--primary) / 0.04);
      }
      .bold-variant .round-chip {
        font-family: "Geist Mono", monospace;
        letter-spacing: 0.06em;
      }

      /* Standard variant uses default cards */
      .std-variant .card-chrome {
        border-radius: 8px;
        border: 1px solid hsl(var(--border));
        background: hsl(var(--card));
      }
      .std-variant .display-number {
        font-weight: 600;
      }
      .std-variant .page-title {
        font-weight: 600;
      }
      .std-variant .section-label {
        font-size: 11px;
        letter-spacing: 0.04em;
        text-transform: uppercase;
        font-weight: 500;
        color: hsl(var(--muted-foreground));
      }
      .std-variant .round-chip {
        font-family: inherit;
      }

      /* Custom checkbox */
      .checkbox {
        appearance: none;
        width: 16px;
        height: 16px;
        border: 1.5px solid hsl(var(--border));
        border-radius: 3px;
        background: white;
        display: inline-grid;
        place-content: center;
        cursor: pointer;
        transition: all 0.08s;
      }
      .checkbox:hover {
        border-color: hsl(var(--primary));
      }
      .checkbox:checked {
        background: hsl(var(--primary));
        border-color: hsl(var(--primary));
      }
      .checkbox:checked::after {
        content: "";
        width: 9px;
        height: 9px;
        background:
          linear-gradient(45deg, transparent 48%, white 48%, white 52%, transparent 52%) no-repeat,
          linear-gradient(-45deg, transparent 48%, white 48%, white 52%, transparent 52%) no-repeat;
        /* simpler: draw a check with SVG fallback */
        background: none;
        width: 10px;
        height: 6px;
        border-left: 2px solid white;
        border-bottom: 2px solid white;
        transform: rotate(-45deg) translate(1px, -1px);
      }
      .checkbox:indeterminate {
        background: hsl(var(--primary));
        border-color: hsl(var(--primary));
      }
      .checkbox:indeterminate::after {
        content: "";
        width: 8px;
        height: 2px;
        background: white;
      }

      /* Pulse ring */
      @keyframes pulsering {
        0% {
          box-shadow: 0 0 0 0 hsl(var(--pending) / 0.5);
        }
        70% {
          box-shadow: 0 0 0 6px hsl(var(--pending) / 0);
        }
        100% {
          box-shadow: 0 0 0 0 hsl(var(--pending) / 0);
        }
      }
      .pulse-dot {
        animation: pulsering 1.8s infinite;
      }

      /* Fade in */
      @keyframes fadeInUp {
        from {
          opacity: 0;
          transform: translateY(4px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      .anim-in {
        animation: fadeInUp 0.22s ease-out both;
      }

      /* Bordered table cell (no double border between rows) */
      table.tight td,
      table.tight th {
        border-bottom: 1px solid hsl(var(--border));
      }

      /* Diagonal stripes for empty slots */
      .diag-stripes {
        background-image: repeating-linear-gradient(
          135deg,
          hsl(var(--muted)) 0 6px,
          hsl(var(--background)) 6px 12px
        );
      }

      /* Subtle grid background for bold variant dashboard top */
      .dot-grid {
        background-image: radial-gradient(
          hsl(var(--foreground) / 0.06) 1px,
          transparent 1px
        );
        background-size: 16px 16px;
      }

      /* Pill */
      .pill {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 2px 8px;
        border-radius: 999px;
        font-size: 11px;
        font-weight: 500;
        line-height: 1.5;
        white-space: nowrap;
      }
      .pill.sq {
        border-radius: 3px;
        font-family: "Geist Mono", monospace;
        letter-spacing: 0.04em;
      }

      /* Scroll anchor helper */
      .snap-x {
        scroll-snap-type: x mandatory;
      }
      .snap-start {
        scroll-snap-align: start;
      }

      /* Ring inset focus */
      button:focus-visible,
      input:focus-visible,
      textarea:focus-visible {
        outline: 2px solid hsl(var(--ring) / 0.4);
        outline-offset: 1px;
      }

      /* Tweaks panel */
      .tweaks-panel {
        position: fixed;
        right: 16px;
        bottom: 16px;
        width: 260px;
        z-index: 40;
        background: hsl(var(--card));
        border: 1px solid hsl(var(--border));
        border-radius: 10px;
        box-shadow: 0 12px 30px -8px hsl(var(--foreground) / 0.18);
        font-size: 12px;
      }
    </style>

    <script
      src="https://unpkg.com/react@18.3.1/umd/react.development.js"
      integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L"
      crossorigin="anonymous"
    ></script>
    <script
      src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js"
      integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm"
      crossorigin="anonymous"
    ></script>
    <script
      src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"
      integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y"
      crossorigin="anonymous"
    ></script>
  </head>
  <body class="antialiased">
    <div id="root"></div>

    <script type="text/babel" data-presets="react" src="invites/data.jsx"></script>
    <script type="text/babel" data-presets="react" src="invites/icons.jsx"></script>
    <script type="text/babel" data-presets="react" src="invites/chrome.jsx"></script>
    <script type="text/babel" data-presets="react" src="invites/leaderboard.jsx"></script>
    <script type="text/babel" data-presets="react" src="invites/round-builder.jsx"></script>
    <script type="text/babel" data-presets="react" src="invites/rounds-timeline.jsx"></script>
    <script type="text/babel" data-presets="react" src="invites/sources.jsx"></script>
    <script type="text/babel" data-presets="react" src="invites/email-preview.jsx"></script>
    <script type="text/babel" data-presets="react" src="invites/app.jsx"></script>
  </body>
</html>
